# NetraScope frontend — standalone nginx site config.
#
# Serves the built SPA (frontend/dist) and reverse-proxies API requests to
# the .NET backend running elsewhere on your local network (e.g. an IIS box
# at 192.168.1.50:5050 — see backend/deploy/README.md).
#
# Install:
#   sudo cp frontend/deploy/nginx.conf /etc/nginx/sites-available/netrascope
#   sudo ln -s /etc/nginx/sites-available/netrascope /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace BACKEND_HOST/BACKEND_PORT below with your backend's LAN
# address, and SPA_ROOT with the path to frontend/dist.

server {
    listen 80;
    server_name _;

    root /var/www/netrascope;   # <- path to frontend/dist
    index index.html;

    # Static SPA — fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Dashboard API + metrics ingestion.
    location /api/ {
        proxy_pass http://BACKEND_HOST:BACKEND_PORT;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Agent binary downloads.
    location /downloads/ {
        proxy_pass http://BACKEND_HOST:BACKEND_PORT;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://BACKEND_HOST:BACKEND_PORT;
        proxy_set_header Host $host;
    }
}
