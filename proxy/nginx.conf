events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;

    # Resolve upstream hostnames at request time via Docker's embedded DNS,
    # so nginx doesn't crash on startup if a dependency isn't registered yet.
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;

        # Metrics ingestion and dashboard API.
        location /api/ {
            set $backend_upstream backend:8080;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Agent binary downloads.
        location /downloads/ {
            set $backend_upstream backend:8080;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
        }

        location /health {
            set $backend_upstream backend:8080;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
        }

        # Everything else: the React SPA.
        location / {
            set $frontend_upstream frontend:80;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
