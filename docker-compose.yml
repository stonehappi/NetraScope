name: netrascope
version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: netrascope
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d netrascope"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: migrations
    environment:
      ConnectionStrings__NetraScope: Host=db;Port=5432;Database=netrascope;Username=postgres;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      Auth__Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env to a long random value}
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: final
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__NetraScope: Host=db;Port=5432;Database=netrascope;Username=postgres;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      Auth__Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set in .env to a long random value}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      - backend

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-8080}:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  db-data:
