events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;

    # Resolve upstream hostnames at request time via Docker's embedded DNS,
    # so nginx doesn't crash on startup if a dependency isn't registered yet.
    resolver 127.0.0.11 valid=10s;

    # Don't advertise the nginx version in responses or error pages.
    server_tokens off;

    server {
        listen 80;

        # Security headers applied to every response (including errors).
        # HSTS assumes TLS is terminated in front of this proxy (e.g. Cloudflare
        # or an outer reverse proxy). Remove it if you serve plain HTTP.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;

        # Metrics ingestion and dashboard API.
        location /api/ {
            set $backend_upstream backend:8080;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Agent binary downloads.
        location /downloads/ {
            set $backend_upstream backend:8080;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
        }

        location /health {
            set $backend_upstream backend:8080;
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
        }

        # Everything else: the React SPA.
        location / {
            set $frontend_upstream frontend:80;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
