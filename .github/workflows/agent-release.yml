name: Agent Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build and publish agent binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Build agent binaries
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          ldflags="-s -w -X main.version=${version}"

          mkdir -p dist

          platforms=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )

          for platform in "${platforms[@]}"; do
            read -r os arch <<< "$platform"
            ext=""
            if [ "$os" = "windows" ]; then
              ext=".exe"
            fi

            out="dist/netrascope-agent-${os}-${arch}${ext}"
            echo "building ${out}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="$ldflags" -o "$out" ./cmd/netrascope-agent
          done

          (cd dist && sha256sum netrascope-agent-* > checksums.txt)

      - name: Publish GitHub release
        shell: bash
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          notes="NetraScope agent ${tag}. Download the binary matching your operating system and CPU architecture."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" agent/dist/* --clobber
          else
            gh release create "$tag" agent/dist/* --title "$tag" --notes "$notes"
          fi
